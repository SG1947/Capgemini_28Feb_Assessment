<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h2>Create Account</h2>
      <p>Register to get started</p>
    </div>

    <div id="message" class="message hidden"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Choose a username" autocomplete="username"/>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter your email" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Create a password" autocomplete="new-password"/>
        <span class="toggle-password" onclick="togglePassword('password', this)">👁</span>
      </div>
    </div>

    <button class="btn" id="registerBtn" onclick="handleRegister()">Register</button>

    <p class="switch-link">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
