<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your account</p>
    </div>
 
    <div id="message" class="message hidden"></div>
 
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
    </div>
 
    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        <span class="toggle-password" onclick="togglePassword('password', this)">👁</span>
      </div>
    </div>
 
    <button class="btn" id="loginBtn" onclick="handleLogin()">Login</button>
 
    <p class="switch-link">Don't have an account? <a href="register.html">Register</a></p>
  </div>
 
  <script src="js/auth.js"></script>
</body>
</html>
